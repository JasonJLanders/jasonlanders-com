// AUDIO SYSTEM | procedural sounds via Web Audio API
// No external assets required. All sounds are synthesized.
// Call AudioSystem.init() on first user gesture (browser req).
// ============================================================
const AudioSystem = (() => {
  let ctx = null;
  let masterGain = null;
  let ambientNodes = [];
  let initialized = false;
  let muted = false;

  function init() {
    if (initialized) return;
    try {
      ctx = new (window.AudioContext || window.webkitAudioContext)();
      masterGain = ctx.createGain();
      masterGain.gain.setValueAtTime(0.35, ctx.currentTime);
      masterGain.connect(ctx.destination);
      initialized = true;
    } catch (e) {
      console.warn('AudioSystem: Web Audio API not available.', e);
    }
  }

  function resume() {
    if (ctx && ctx.state === 'suspended') ctx.resume();
  }

  function ready() {
    if (!initialized) return false;
    resume();
    return !!ctx;
  }

  function tone(freq, type, duration, vol, delay = 0) {
    if (!ready()) return;
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    const t = ctx.currentTime + delay;
    osc.type = type;
    osc.frequency.setValueAtTime(freq, t);
    gain.gain.setValueAtTime(vol, t);
    gain.gain.exponentialRampToValueAtTime(0.0001, t + duration);
    osc.connect(gain);
    gain.connect(masterGain);
    osc.start(t);
    osc.stop(t + duration + 0.02);
  }

  function noise(duration, vol, delay = 0, filterFreqStart = 3000, filterFreqEnd = 200) {
    if (!ready()) return;
    const bufSize = Math.ceil(ctx.sampleRate * duration);
    const buf = ctx.createBuffer(1, bufSize, ctx.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < bufSize; i++) data[i] = Math.random() * 2 - 1;
    const src = ctx.createBufferSource();
    src.buffer = buf;
    const filter = ctx.createBiquadFilter();
    filter.type = 'bandpass';
    const t = ctx.currentTime + delay;
    filter.frequency.setValueAtTime(filterFreqStart, t);
    filter.frequency.exponentialRampToValueAtTime(filterFreqEnd, t + duration);
    const gain = ctx.createGain();
    gain.gain.setValueAtTime(vol, t);
    gain.gain.exponentialRampToValueAtTime(0.0001, t + duration);
    src.connect(filter);
    filter.connect(gain);
    gain.connect(masterGain);
    src.start(t);
    src.stop(t + duration + 0.02);
  }

  function playClick() {
    tone(720, 'sine', 0.09, 0.28);
    tone(540, 'sine', 0.09, 0.14, 0.045);
  }

  function playHover() {
    tone(520, 'sine', 0.04, 0.08);
  }

  function playNotification() {
    tone(880, 'sine', 0.22, 0.22);
    tone(1109, 'sine', 0.20, 0.18, 0.16);
  }

  function playTransition() {
    noise(0.32, 0.38, 0, 2800, 180);
    tone(220, 'sine', 0.32, 0.12);
  }

  function playTick() {
    tone(420, 'square', 0.07, 0.12);
  }

  function playUrgentTick() {
    tone(640, 'square', 0.07, 0.18);
    tone(480, 'square', 0.05, 0.10, 0.04);
  }

  function playSuccess() {
    [440, 554, 659, 880].forEach((f, i) => tone(f, 'sine', 0.22, 0.28, i * 0.09));
  }

  function playWrong() {
    tone(220, 'sawtooth', 0.28, 0.26);
    tone(196, 'sawtooth', 0.22, 0.20, 0.12);
  }

  function playDayChime() {
    tone(660, 'sine', 0.18, 0.14);
    tone(990, 'sine', 0.14, 0.10, 0.20);
  }

  function startAmbient() {
    if (!ready()) return;
    stopAmbient();
    const baseFreq = 55;
    const voices = [
      { f: baseFreq,         type: 'sine',     vol: 0.055 },
      { f: baseFreq * 1.005, type: 'sine',     vol: 0.050 },
      { f: baseFreq * 1.5,   type: 'triangle', vol: 0.030 },
      { f: baseFreq * 2,     type: 'sine',     vol: 0.018 },
    ];
    voices.forEach(({ f, type, vol }) => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = type;
      osc.frequency.setValueAtTime(f, ctx.currentTime);
      gain.gain.setValueAtTime(0, ctx.currentTime);
      gain.gain.linearRampToValueAtTime(vol, ctx.currentTime + 2.5);
      osc.connect(gain);
      gain.connect(masterGain);
      osc.start();
      ambientNodes.push({ osc, gain, targetVol: vol });
    });
  }

  function stopAmbient() {
    if (!ctx) return;
    ambientNodes.forEach(({ osc, gain }) => {
      try {
        gain.gain.linearRampToValueAtTime(0, ctx.currentTime + 1.2);
        osc.stop(ctx.currentTime + 1.4);
      } catch (_) {}
    });
    ambientNodes = [];
  }

  function fadeAmbient(targetMul, durationSecs = 1.5) {
    if (!ctx) return;
    ambientNodes.forEach(({ gain, targetVol }) => {
      gain.gain.linearRampToValueAtTime(targetVol * targetMul, ctx.currentTime + durationSecs);
    });
  }

  function toggleMute() {
    if (!ready()) return muted;
    muted = !muted;
    masterGain.gain.linearRampToValueAtTime(muted ? 0 : 0.35, ctx.currentTime + 0.1);
    return muted;
  }

  function isMuted() { return muted; }

  return {
    init,
    playClick, playHover, playNotification, playTransition,
    playTick, playUrgentTick, playSuccess, playWrong, playDayChime,
    startAmbient, stopAmbient, fadeAmbient,
    toggleMute, isMuted,
  };
})();

// SCENE: TITLE
// ============================================================
class TitleScene extends Phaser.Scene {
  constructor() { super({ key: 'TitleScene' }); }

  create() {
    resetState();
    const cx = W / 2;
    const g = this.add.graphics();

    g.fillStyle(0x0a0612);
    g.fillRect(0, 0, W, H);

    // Back link
    this.add.text(20, 20, '\u2190 Field Ready by Jason Landers', {
      fontSize: '11px', fontFamily: 'Inter, sans-serif', fontStyle: 'bold',
      color: '#d946ef', letterSpacing: 1
    }).setInteractive({ cursor: 'pointer' })
      .on('pointerdown', () => { window.location.href = '/field-ready/'; })
      .on('pointerover', function() { this.setAlpha(0.7); })
      .on('pointerout', function() { this.setAlpha(1); });

    // Starfield
    for (let i = 0; i < 120; i++) {
      const sx = Math.random() * W, sy = Math.random() * H;
      const br = Math.random() * 0.6 + 0.1;
      g.fillStyle(0xffffff, br);
      g.fillCircle(sx, sy, Math.random() * 1.2 + 0.3);
    }

    // Glow orb behind title

// ============================================================
// SCENE: CITY MAP
// ============================================================
class CityScene extends Phaser.Scene {
  constructor() { super({ key: 'CityScene' }); }

  create() {
    this.cameras.main.setBackgroundColor('#1a3a2a');

    this.drawGround();
    this.drawRoads();
    this.drawBuildings();
    this.drawTrees();
    this.createCar();
    this.createCompetitorCar();
    this.createHUD();
    this.createClickTargets();
    this.createAvailabilityGlow();
    this.createNotification();
    this.createDayNightOverlay();

    // Show feedback from last decision
    if (STATE.feedbackQueue.length > 0) {
      this.time.delayedCall(600, () => {
        this.showFeedback(STATE.feedbackQueue.shift());
      });
    }

    // Check win/lose
    if (STATE.dealHealth <= 0) {
      this.time.delayedCall(800, () => this.scene.start('OutcomeScene', { won: false }));
      return;
    }
    if (STATE.completed.length >= SCENARIOS.length) {
      this.time.delayedCall(800, () => this.scene.start('OutcomeScene', { won: STATE.dealHealth >= 50 }));
      return;
    }

    // Advance act
    const done = STATE.completed.length;
    if (done >= 6) { STATE.act = 3; STATE.actName = 'Close'; }
    else if (done >= 3) { STATE.act = 2; STATE.actName = 'Demo'; }
    else { STATE.act = 1; STATE.actName = 'Discovery'; }

    // Inbox notifications
    this.time.addEvent({ delay: 7000, callback: this.showInboxNotif, callbackScope: this, loop: true });

    // Init audio + start ambient on first user interaction (browser autoplay policy)
    this.input.once('pointerdown', () => {
      AudioSystem.init();
      AudioSystem.startAmbient();
    });
  }

  drawGround() {
    const g = this.add.graphics();
    g.fillStyle(0x2d5a3a);
    g.fillRect(0, 0, W, H);
    g.fillStyle(0x3a3248, 0.5);
    g.fillRect(0, H * 0.52 - 24, W, 48);
    g.fillRect(0, H * 0.75 - 20, W, 40);
    g.fillRect(W * 0.38 - 24, 0, 48, H);
    g.fillRect(W * 0.72 - 22, 0, 44, H);
    g.fillStyle(0x2a2040, 0.4);
    g.fillRect(40, 80, 200, 160);
    g.fillRect(W - 260, 60, 230, 200);
    g.fillRect(W * 0.42, H * 0.58, 160, 120);
    g.fillRect(W * 0.55, H * 0.72, 150, 105);
  }

  drawRoads() {
    const g = this.add.graphics();
    g.fillStyle(0x2e2448);
    g.fillRect(0, H * 0.52 - 20, W, 40);
    g.fillRect(0, H * 0.75 - 16, W, 32);
    g.fillRect(W * 0.38 - 20, 0, 40, H);

      g.fillRect(x, H * 0.52 - 1, 24, 2);

    for (let y = 0; y < H; y += 40) {

      g.fillRect(W * 0.72 - 1, y, 2, 24);

    g.fillStyle(0xd946ef); g.fillRect(hx, hy, hw, 6);

    }).setOrigin(0.5);

    }).setOrigin(0.5);
  }

  drawTrees() {
    const g = this.add.graphics();
    const pts = [
      [220, 160], [240, 340], [360, 120], [360, 340],
      [W - 320, 300], [W - 95, 300], [W - 95, 425],
      [W * 0.38 + 40, H * 0.30], [W * 0.38 - 60, H * 0.35],
      [140, H * 0.65], [200, H * 0.70],
    ];
    pts.forEach(([x, y]) => {
      g.fillStyle(0x000000, 0.2); g.fillEllipse(x + 3, y + 3, 26, 16);
      g.fillStyle(0x22c55e); g.fillCircle(x, y, 14);
      g.fillStyle(0x16a34a); g.fillCircle(x - 4, y - 3, 10);
      g.fillStyle(0x4ade80, 0.35); g.fillCircle(x + 3, y - 5, 7);
    });
  }

  createCar() {
    this.carG = this.add.graphics();
    this.carX = W * 0.38;
    this.carY = H * 0.52;
    this.carPathIdx = 0;
    // Road centerlines: H_ROAD_1=H*0.52, V_ROAD_1=W*0.38, V_ROAD_2=W*0.72
    // Strictly horizontal or vertical segments only
    this.carPath = [
      { x: W * 0.38, y: H * 0.52 },  // V_ROAD_1 / H_ROAD_1 junction
      { x: W * 0.38, y: 185 },         // up V_ROAD_1 near HQ
      { x: W * 0.38, y: H * 0.52 },  // back down to junction
      { x: W * 0.72, y: H * 0.52 },  // right on H_ROAD_1 to V_ROAD_2 junction
      { x: W * 0.72, y: 165 },         // up V_ROAD_2 near Axiom
      { x: W * 0.72, y: H * 0.52 },  // back down to junction
      { x: W * 0.38, y: H * 0.52 },  // left on H_ROAD_1 to V_ROAD_1
      { x: W * 0.38, y: H * 0.64 },  // down V_ROAD_1 near Coffee Shop
      { x: W * 0.38, y: H * 0.52 },  // back up to junction
    ];
    this.drawCarAt(this.carX, this.carY);
    this.moveCar();
  }

  drawCarAt(x, y) {
    this.carG.clear();
    this.carG.fillStyle(0x000000, 0.25);
    this.carG.fillEllipse(x + 2, y + 8, 38, 12);
    this.carG.fillStyle(0xd946ef);
    this.carG.fillRoundedRect(x - 18, y - 8, 36, 16, 4);
    this.carG.fillStyle(0xffffff, 0.25);
    this.carG.fillRoundedRect(x - 8, y - 6, 16, 8, 2);
    this.carG.fillStyle(0x1a1020);
    this.carG.fillCircle(x - 12, y + 7, 5);
    this.carG.fillCircle(x + 12, y + 7, 5);
    // Glow
    this.carG.fillStyle(0xd946ef, 0.08);
    this.carG.fillCircle(x, y, 22);
  }

  moveCar() {
    const next = this.carPath[this.carPathIdx % this.carPath.length];
    const dx = Math.abs(next.x - this.carX);
    const dy = Math.abs(next.y - this.carY);
    const dist = dx + dy;
    const duration = Math.max(400, (dist / 110) * 1000);
    this.tweens.add({
      targets: this,
      carX: next.x, carY: next.y,
      duration: duration,
      ease: 'Linear',
      onUpdate: () => this.drawCarAt(this.carX, this.carY),
      onComplete: () => {
        this.carPathIdx++;
        this.time.addEvent({ delay: 280, callback: this.moveCar, callbackScope: this });
      }
    });
  }

  createCompetitorCar() {
    this.compCar = this.add.graphics();
    this.compX = W * 0.65;
    this.compY = H * 0.75;
    this.compMoving = false;

    this._drawComp = () => {
      this.compCar.clear();
      if (this.compMoving) {
        // Pulsing red glow while moving
        this.compCar.fillStyle(0xef4444, 0.18);
        this.compCar.fillCircle(this.compX, this.compY, 24);
      }
      this.compCar.fillStyle(0x000000, 0.2);
      this.compCar.fillEllipse(this.compX + 2, this.compY + 6, 30, 9);
      this.compCar.fillStyle(0xef4444);
      this.compCar.fillRoundedRect(this.compX - 14, this.compY - 6, 28, 12, 3);
      this.compCar.fillStyle(0xffffff, 0.18);
      this.compCar.fillRoundedRect(this.compX - 5, this.compY - 5, 10, 7, 2);
      this.compCar.fillStyle(0x1a0d0d);
      this.compCar.fillCircle(this.compX - 9, this.compY + 5, 4);
      this.compCar.fillCircle(this.compX + 9, this.compY + 5, 4);
    };
    this._drawComp();

    // Helper: run waypoints sequentially with proportional speed
    const runWaypoints = (wps, onDone) => {
      let idx = 0;
      const step = () => {
        if (idx >= wps.length) { onDone(); return; }
        const wp = wps[idx++];
        const dist = Math.abs(wp.x - this.compX) + Math.abs(wp.y - this.compY);
        const duration = Math.max(400, (dist / 100) * 1000);
        this.tweens.add({
          targets: this, compX: wp.x, compY: wp.y,
          duration, ease: 'Linear',
          onUpdate: this._drawComp,
          onComplete: step
        });
      };
      step();
    };

    this.time.addEvent({
      delay: 15000,
      callback: () => {
        const startX = this.compX, startY = this.compY;
        this.compMoving = true;
        this.showCompetitorAlert();
        // Road-following: H_ROAD_2 right to V_ROAD_2, up V_ROAD_2 to near Axiom
        const toAxiom = [
          { x: W * 0.72, y: H * 0.75 },
          { x: W * 0.72, y: H * 0.52 },
          { x: W * 0.72, y: 165 },
        ];
        const returnPath = [
          { x: W * 0.72, y: H * 0.52 },
          { x: W * 0.72, y: H * 0.75 },
          { x: startX, y: startY },
        ];
        runWaypoints(toAxiom, () => {
          this.compMoving = false;
          this._drawComp();
          this.time.delayedCall(4000, () => {
            runWaypoints(returnPath, () => {});
          });
        });
      },
      loop: true
    });
  }

    }).setDepth(6));

      this.time.delayedCall(400, () => this.scene.start('ScrambleScene', { qIndex: 0 }));
    });

    // Mute button (top-right of HUD)
    const muteBtn = _t(this.add.text(W - 14, hudY + 12, AudioSystem.isMuted() ? '\uD83D\uDD07' : '\uD83D\uDD0A', {
      fontSize: '16px'
    }).setOrigin(1, 0).setInteractive({ cursor: 'pointer' }).setDepth(9));
    muteBtn.on('pointerdown', () => {
      AudioSystem.init();
      const nowMuted = AudioSystem.toggleMute();
      muteBtn.setText(nowMuted ? '\uD83D\uDD07' : '\uD83D\uDD0A');
    });

    // Next destination hint
    const hint = this.nextScenario();
    const hintMap = {
      'disc_1': 'Priya is ready to meet \u2014 head to Axiom Systems',
      'disc_2': 'Marcus is watching \u2014 follow up at Axiom Systems',
      'coffee_1': 'Priya wants to talk \u2014 meet her at The Corner',
      'demo_1': 'Technical demo scheduled \u2014 head to Axiom Systems',
      'demo_2': 'Marcus has questions \u2014 head to Axiom Systems',
      'hq_1': 'Sarah wants a deal update \u2014 check in at Your HQ',
      'close_1': 'Marcus called \u2014 closing time at Axiom Systems',
      'close_2': 'Priya texted you \u2014 meet her at The Corner',
    };
    const hintTxt = hint
      ? '\u25b6 ' + (hintMap[hint.id] || 'Head to ' + hint.location)
      : 'All scenarios complete \u2014 deal concluding...';
    _t(this.add.text(20, hudY - 22, hintTxt, {
      fontSize: '11px', fontFamily: 'Inter, sans-serif', color: '#60a5fa'
    }).setDepth(6));
  }

  redrawHUD() {
    this.createHUD();
  }

  drawHUDMeter(g, x, y, width, label, pct, c1, c2) {
    const lbl = this.add.text(x, y, label, {
      fontSize: '10px', fontFamily: 'Inter, sans-serif', fontStyle: 'bold',
      color: '#a895c0', letterSpacing: 1
    }).setDepth(6);
    if (this._hudObjects) this._hudObjects.push(lbl);
    g.fillStyle(0x1e1530);
    g.fillRoundedRect(x, y + 15, width, 8, 4);
    const fillW = Math.max(0, Math.min(1, pct / 100)) * width;
    if (fillW > 0) {
      g.fillGradientStyle(c1, c2, c1, c2, 1);
      g.fillRoundedRect(x, y + 15, fillW, 8, 4);
    }
    // Ensure at least 24px padding from right edge
    const valX = Math.min(x + width + 8, W - 28);
    const val = this.add.text(valX, y + 12, Math.round(pct).toString(), {
      fontSize: '11px', fontFamily: 'Inter, sans-serif', fontStyle: 'bold', color: '#ede8f5'
    }).setDepth(6);
    if (this._hudObjects) this._hudObjects.push(val);
  }

  nextScenario() {
    return SCENARIOS.find(s => !STATE.completed.includes(s.id) && s.act === STATE.act)
      || SCENARIOS.find(s => !STATE.completed.includes(s.id));
  }

  createAvailabilityGlow() {
    const buildings = [
      { x: 60,       y: 90,       w: 180, h: 130, key: 'Your HQ',       color: 0xd946ef },
      { x: W - 275,  y: 62,       w: 215, h: 165, key: 'Axiom Systems', color: 0x60a5fa },
      { x: W * 0.44, y: H * 0.60, w: 120, h: 90,  key: 'The Corner',    color: 0xf59e0b },
    ];
    buildings.forEach(b => {
      const hasScenario = SCENARIOS.some(s => !STATE.completed.includes(s.id) && s.location === b.key);
      if (hasScenario) {
        const glow = this.add.graphics().setDepth(2);
        glow.lineStyle(3, b.color, 0.55);
        glow.strokeRect(b.x - 4, b.y - 4, b.w + 8, b.h + 8);
        glow.fillStyle(b.color, 0.05);
        glow.fillRect(b.x - 4, b.y - 4, b.w + 8, b.h + 8);
        this.tweens.add({
          targets: glow, alpha: 0.25, duration: 1400,
          ease: 'Sine.easeInOut', yoyo: true, repeat: -1
        });
        // Badge offset outside corner like a mobile app notification badge
        const dot = this.add.graphics().setDepth(3);
        const badgeX = b.x + b.w + 2;
        const badgeY = b.y - 2;
        dot.fillStyle(0xff3333, 1);
        dot.fillCircle(badgeX, badgeY, 8);
        dot.lineStyle(2, 0x0d0618);
        dot.strokeCircle(badgeX, badgeY, 8);
        this.tweens.add({
          targets: dot, alpha: 0.2, duration: 850,
          ease: 'Sine.easeInOut', yoyo: true, repeat: -1
        });
      }
    });
  }

  createClickTargets() {
    const buildings = [
      { x: 60,       y: 90,       w: 180, h: 130, key: 'Your HQ',       color: 0xd946ef },
      { x: W - 275,  y: 62,       w: 215, h: 165, key: 'Axiom Systems', color: 0x60a5fa },
      { x: W * 0.44, y: H * 0.60, w: 120, h: 90,  key: 'The Corner',    color: 0xf59e0b },
    ];

    buildings.forEach(b => {
      const zone = this.add.zone(b.x, b.y, b.w, b.h).setOrigin(0).setInteractive({ cursor: 'pointer' }).setDepth(4);
      const hl = this.add.graphics().setDepth(3);
      zone.on('pointerover', () => {
        AudioSystem.playHover();
        hl.clear();
        hl.lineStyle(2, b.color, 0.9);
        hl.strokeRect(b.x, b.y, b.w, b.h);
        hl.fillStyle(b.color, 0.09);
        hl.fillRect(b.x, b.y, b.w, b.h);
      });
      zone.on('pointerout', () => hl.clear());
      zone.on('pointerdown', () => {
        // Vertex encounter: one-time event at The Corner, days 5-15
        if (b.key === 'The Corner' && !STATE.vertexEncountered && STATE.day >= 5 && STATE.day <= 15) {
          AudioSystem.playClick();
          this.showVertexEncounter();
          return;
        }

        const scenario = SCENARIOS.find(s => !STATE.completed.includes(s.id) && s.location === b.key)
          || SCENARIOS.find(s => !STATE.completed.includes(s.id));
        if (!scenario) {
          this.scene.start('OutcomeScene', { won: STATE.dealHealth >= 50 });
          return;
        }
        if (scenario.location !== b.key) {
          AudioSystem.playClick();
          this.showToast('\u25b6 Head to ' + scenario.location + ' next');
          return;
        }
        AudioSystem.playClick();
        AudioSystem.playTransition();
        STATE.day += 2;
        this.cameras.main.flash(300, 13, 6, 24);
        this.time.delayedCall(400, () => {
          if (scenario.type === 'scramble') {
            this.scene.start('ScrambleScene', { scenarioId: scenario.id });
          } else {
            this.scene.start('DecisionScene', { scenarioId: scenario.id });
          }
        });
      });
    });
  }

  createDayNightOverlay() {
    const g = this.add.graphics().setDepth(9);
    g.fillStyle(0x000033, 0.06);
    g.fillRect(0, 0, W, H);
  }

  createNotification() {
    this.notifQueue = [];
  }

  showStackedNotif(from, text, accentColor) {
    accentColor = accentColor || 0xd946ef;
    const nw = 270, nh = 66;
    const nx = 20;
    const baseY = H - 210;

    // FIFO: remove oldest if already at max 3
    if (this.notifQueue.length >= 3) {
      const oldest = this.notifQueue.shift();
      this.tweens.add({
        targets: oldest.container, alpha: 0, duration: 300,
        onComplete: () => oldest.container.destroy()
      });
    }

    // Push existing notifications up by 72px
    this.notifQueue.forEach(n => {
      this.tweens.add({ targets: n.container, y: n.container.y - 72, duration: 200 });
    });

    // Build new notification as a container
    const container = this.add.container(nx, baseY).setDepth(20);
    const g = this.add.graphics();
    g.fillStyle(0x1e1530, 0.97);
    g.fillRoundedRect(0, 0, nw, nh, 10);
    g.lineStyle(2, accentColor, 0.65);
    g.strokeRoundedRect(0, 0, nw, nh, 10);
    g.fillStyle(accentColor);
    g.fillRect(0, 0, nw, 3);

    const accentHex = '#' + accentColor.toString(16).padStart(6, '0');
    const titleTxt = this.add.text(12, 10, '\uD83D\uDCEC ' + from.toUpperCase(), {
      fontSize: '9px', fontFamily: 'Inter, sans-serif', fontStyle: 'bold',
      color: accentHex, letterSpacing: 1
    });
    const bodyTxt = this.add.text(12, 28, text, {
      fontSize: '11px', fontFamily: 'Inter, sans-serif', color: '#ede8f5',
      wordWrap: { width: nw - 24 }
    });

    container.add([g, titleTxt, bodyTxt]);
    container.setAlpha(0);
    AudioSystem.playNotification();
    this.tweens.add({ targets: container, alpha: 1, duration: 300 });

    const entry = { container };
    this.notifQueue.push(entry);

    this.time.delayedCall(4000, () => {
      this.tweens.add({
        targets: container, alpha: 0, duration: 400,
        onComplete: () => {
          container.destroy();
          const idx = this.notifQueue.indexOf(entry);
          if (idx !== -1) this.notifQueue.splice(idx, 1);
        }
      });
    });
  }

  showInboxNotif() {
    const msgs = [
      { from: 'Priya', text: 'Quick question on the API auth flow , can we chat?' },
      { from: 'Alex (AE)', text: 'Heads up: Vertex is sniffing around Axiom. Heard it from their CTO\'s EA.' },
      { from: 'Marcus', text: 'Looking forward to next week. Bring something concrete on ROI.' },
      { from: 'Sarah', text: 'Board review is Thursday. How does the Axiom deal look?' },
      { from: 'Dev (Axiom)', text: 'Do you support OTel natively or is it a plugin?' },
    ];
    const msg = msgs[Math.floor(Math.random() * msgs.length)];
    this.showStackedNotif(msg.from, msg.text);
  }

  showVertexEncounter() {
    // vertex_encounter: one-time event - Vertex rep at The Corner, Alex warns about free POV
    const overlay = this.add.graphics().setDepth(40);
    overlay.fillStyle(0x0a0612, 0.93);
    overlay.fillRect(0, 0, W, H);

    const cx = W / 2;
    const boxW = Math.min(640, W - 60);
    const boxX = cx - boxW / 2;
    const boxY = H * 0.08;
    const g = this.add.graphics().setDepth(41);
    g.fillStyle(0x1e1530);
    g.fillRoundedRect(boxX, boxY, boxW, H * 0.84, 14);
    g.lineStyle(2, 0xef4444, 0.9);
    g.strokeRoundedRect(boxX, boxY, boxW, H * 0.84, 14);
    g.fillStyle(0xef4444);
    g.fillRect(boxX, boxY, boxW, 3);

    this.add.text(cx, boxY + 22, 'UNEXPECTED ENCOUNTER \u2014 THE CORNER', {
      fontSize: '10px', fontFamily: 'Inter, sans-serif', fontStyle: 'bold',
      color: '#ef4444', letterSpacing: 2
    }).setOrigin(0.5).setDepth(42);

    this.add.text(cx, boxY + 44, 'You and Alex are grabbing coffee. A Vertex rep you recognize from a conference walks in and spots you.', {
      fontSize: '11px', fontFamily: 'Inter, sans-serif', fontStyle: 'italic',
      color: '#8b7fa8', wordWrap: { width: boxW - 40 }, align: 'center'
    }).setOrigin(0.5).setDepth(42);

    // Vertex rep quote
    g.fillStyle(0x2d0d0d);
    g.fillRoundedRect(boxX + 20, boxY + 80, boxW - 40, 56, 8);
    g.lineStyle(1, 0xef4444, 0.4);
    g.strokeRoundedRect(boxX + 20, boxY + 80, boxW - 40, 56, 8);
    this.add.text(boxX + 34, boxY + 86, '\uD83D\uDC64  RAJ \u2014 VERTEX REP', {
      fontSize: '9px', fontFamily: 'Inter, sans-serif', fontStyle: 'bold', color: '#ef4444', letterSpacing: 1
    }).setDepth(42);
    this.add.text(boxX + 34, boxY + 100, '"Heard you\'re in at Axiom. Small world. We\'re talking to them too."', {
      fontSize: '12px', fontFamily: 'Inter, sans-serif', color: '#ede8f5', wordWrap: { width: boxW - 68 }
    }).setDepth(42);

    // Alex warning
    g.fillStyle(0x0a2010);
    g.fillRoundedRect(boxX + 20, boxY + 146, boxW - 40, 56, 8);
    g.lineStyle(1, 0x22c55e, 0.4);
    g.strokeRoundedRect(boxX + 20, boxY + 146, boxW - 40, 56, 8);
    this.add.text(boxX + 34, boxY + 152, '\uD83E\uDD1D  ALEX \u2014 YOUR AE', {
      fontSize: '9px', fontFamily: 'Inter, sans-serif', fontStyle: 'bold', color: '#22c55e', letterSpacing: 1
    }).setDepth(42);
    this.add.text(boxX + 34, boxY + 166, '"Vertex does a free 30-day POV to get a foot in the door. If they offer that, we\'re playing defense."', {
      fontSize: '12px', fontFamily: 'Inter, sans-serif', color: '#ede8f5', wordWrap: { width: boxW - 68 }
    }).setDepth(42);

    this.add.text(cx, boxY + 218, 'HOW DO YOU RESPOND?', {
      fontSize: '10px', fontFamily: 'Inter, sans-serif', fontStyle: 'bold', color: '#8b7fa8', letterSpacing: 2
    }).setOrigin(0.5).setDepth(42);

    const vertex_encounter_choices = [
      { text: '"Let\'s get ahead of it. I\'ll call Priya today and offer to structure a formal eval before Vertex gets traction."', deal: 10, energy: -1, champion: 8, feedback: 'Proactive move. Priya appreciates the heads-up. You lock in a structured eval timeline before Vertex can land a free POV.' },
      { text: '"Our product is better. Axiom will figure that out. I\'m not going to react to Vertex."', deal: -8, energy: -1, champion: 0, feedback: 'Overconfident. Vertex\'s free POV lands two weeks later. You\'re now playing catch-up on their terms.' },
      { text: '"What does Vertex\'s typical POV look like? Let\'s map their playbook before we react."', deal: 12, energy: -1, champion: 10, feedback: 'Strategic. You and Alex spend 20 minutes mapping Vertex\'s approach. You go into Axiom\'s next meeting prepared to counter.' },
    ];

    const choiceW = boxW - 40;
    const choiceX = boxX + 20;
    let answered = false;

    vertex_encounter_choices.forEach((choice, i) => {
      const cy2 = boxY + 244 + i * 62;
      const ch2 = 54;
      g.fillStyle(0x271c3d);
      g.fillRoundedRect(choiceX, cy2, choiceW, ch2, 8);
      g.lineStyle(2, 0x2e2249);
      g.strokeRoundedRect(choiceX, cy2, choiceW, ch2, 8);
      const ltr = this.add.text(choiceX + 20, cy2 + ch2 / 2, String.fromCharCode(65 + i), {
        fontSize: '11px', fontFamily: 'Inter, sans-serif', fontStyle: 'bold', color: '#ef4444'
      }).setOrigin(0.5).setDepth(42);
      this.add.text(choiceX + 42, cy2 + 9, choice.text, {
        fontSize: '11px', fontFamily: 'Inter, sans-serif', color: '#ede8f5',
        wordWrap: { width: choiceW - 52 }
      }).setDepth(42);

      const zone = this.add.zone(choiceX, cy2, choiceW, ch2).setOrigin(0).setInteractive({ cursor: 'pointer' }).setDepth(43);
      const hl = this.add.graphics().setDepth(42);
      zone.on('pointerover', () => {
        if (answered) return;
        AudioSystem.playHover();
        hl.clear();
        hl.lineStyle(2, 0xef4444);
        hl.strokeRoundedRect(choiceX, cy2, choiceW, ch2, 8);
        hl.fillStyle(0xef4444, 0.06);
        hl.fillRoundedRect(choiceX, cy2, choiceW, ch2, 8);
      });
      zone.on('pointerout', () => hl.clear());
      zone.on('pointerdown', () => {
        if (answered) return;
        answered = true;
        AudioSystem.playClick();
        if (choice.deal > 0) AudioSystem.playSuccess(); else AudioSystem.playWrong();

        STATE.dealHealth = clamp(0, 100, STATE.dealHealth + choice.deal);
        STATE.championStrength = clamp(0, 100, STATE.championStrength + choice.champion);
        STATE.energy = clamp(0, 10, STATE.energy + choice.energy);
        STATE.vertexEncountered = true;
        this.redrawHUD();

        // Show feedback overlay over encounter
        const fb = this.add.graphics().setDepth(50);
        fb.fillStyle(0x0d0618, 0.95);
        fb.fillRect(0, 0, W, H);
        this.add.text(cx, H * 0.3, choice.deal > 0 ? '\u2714 Good Read' : '\u2716 Missed It', {
          fontSize: '28px', fontFamily: 'Inter, sans-serif', fontStyle: 'bold',
          color: choice.deal > 0 ? '#22c55e' : '#ef4444'
        }).setOrigin(0.5).setDepth(51);
        this.add.text(cx, H * 0.3 + 52, choice.feedback, {
          fontSize: '13px', fontFamily: 'Inter, sans-serif', fontStyle: 'italic',
          color: '#a895c0', wordWrap: { width: Math.min(520, W - 80) }, align: 'center', lineSpacing: 4
        }).setOrigin(0.5).setDepth(51);
        this.add.text(cx, H * 0.3 + 130, 'VERTEX IN PLAY \u2014 watch the city map for their car', {
          fontSize: '11px', fontFamily: 'Inter, sans-serif', fontStyle: 'bold',
          color: '#ef4444', letterSpacing: 1
        }).setOrigin(0.5).setDepth(51);

        const contBtn = this.add.text(cx, H * 0.3 + 170, 'Continue \u2192', {
          fontSize: '15px', fontFamily: 'Inter, sans-serif', fontStyle: 'bold', color: '#ede8f5'
        }).setOrigin(0.5).setInteractive({ cursor: 'pointer' }).setDepth(52);
        contBtn.on('pointerdown', () => {
          [overlay, g, fb].forEach(o => { try { o.destroy(); } catch (e) {} });
          this.children.list
            .filter(c => c.depth >= 41)
            .forEach(c => { try { c.destroy(); } catch (e) {} });
        });
      });
    });
  }

  showFeedback(msg) {
    if (!msg) return;
    // FIX 6: bottom-left, solid dark background, measure text height first
    const fw = Math.min(500, W - 80);
    const g = this.add.graphics().setDepth(30);
    const t = this.add.text(36, 0, msg, {
      fontSize: '12px', fontFamily: 'Inter, sans-serif',
      color: '#ede8f5', wordWrap: { width: fw - 32 }, lineSpacing: 3
    }).setDepth(31);
    const fh = t.height + 32;
    const fx = 20, fy = H - 100 - fh - 14;
    g.fillStyle(0x0d0618, 0.97);
    g.fillRoundedRect(fx, fy, fw, fh, 10);
    g.lineStyle(2, 0xd946ef, 0.65);
    g.strokeRoundedRect(fx, fy, fw, fh, 10);
    g.fillStyle(0xd946ef);
    g.fillRect(fx, fy, fw, 3);
    t.setPosition(fx + 16, fy + 14);
    const dismiss = () => { g.destroy(); t.destroy(); zone.destroy(); };
    const zone = this.add.zone(fx, fy, fw, fh).setOrigin(0).setInteractive({ cursor: 'pointer' }).setDepth(32);
    zone.on('pointerdown', dismiss);
    this.time.delayedCall(4500, dismiss);
  }

  showToast(msg) {
    // FIX 6: bottom-left corner, solid background
    const tw = Math.min(380, W - 40);
    const tx = 20, ty = H - 100 - 44 - 14;
    const g = this.add.graphics().setDepth(30);
    g.fillStyle(0x0d0618, 0.97);
    g.fillRoundedRect(tx, ty, tw, 44, 8);
    g.lineStyle(2, 0xf59e0b, 0.65);
    g.strokeRoundedRect(tx, ty, tw, 44, 8);
    g.fillStyle(0xf59e0b);
    g.fillRect(tx, ty, tw, 3);
    const t = this.add.text(tx + 14, ty + 22, msg, {
      fontSize: '12px', fontFamily: 'Inter, sans-serif', color: '#f59e0b'
    }).setOrigin(0, 0.5).setDepth(31);
    this.time.delayedCall(2500, () => { g.destroy(); t.destroy(); });
  }
}

// ============================================================
// SCENE: DECISION
// ============================================================
class DecisionScene extends Phaser.Scene {
  constructor() { super({ key: 'DecisionScene' }); }

  init(data) {
    this.scenario = SCENARIOS.find(s => s.id === data.scenarioId) || SCENARIOS[0];
  }

  create() {
    const sc = this.scenario;
    this.answered = false;
    AudioSystem.fadeAmbient(0.3, 1.2);
    this.cameras.main.setBackgroundColor('#130d1c');
    const g = this.add.graphics();

    g.fillStyle(0x130d1c); g.fillRect(0, 0, W, H);
    g.lineStyle(1, 0x1a1228);
    for (let x = 0; x < W; x += 44) g.lineBetween(x, 0, x, H);
    for (let y = 0; y < H; y += 44) g.lineBetween(0, y, W, y);

    // Top bar
    g.fillStyle(0x1e1530); g.fillRect(0, 0, W, 60);
    g.lineStyle(1, 0x2e2249); g.lineBetween(0, 60, W, 60);
    g.fillStyle(0xd946ef); g.fillRect(0, 0, W, 3);

    this.add.text(20, 16, sc.location.toUpperCase() + ' \u2014 ' + sc.title.toUpperCase(), {
      fontSize: '10px', fontFamily: 'Inter, sans-serif', fontStyle: 'bold', color: '#d946ef', letterSpacing: 2
    });
    this.add.text(20, 38, 'Day ' + STATE.day + '  \u00b7  Act ' + STATE.act + ': ' + STATE.actName + '  \u00b7  Energy: ' + STATE.energy + '/10', {
      fontSize: '10px', fontFamily: 'Inter, sans-serif', color: '#8b7fa8'
    });

    // FIX 5: push bars left for 24px+ right padding, widen label area
    this.drawBarMini(g, W - 248, 14, 200, 'DEAL', STATE.dealHealth, 0xd946ef, 0xa78bfa);
    this.drawBarMini(g, W - 248, 36, 200, 'CHAMPION', STATE.championStrength, 0x22c55e, 0x86efac);

    const cx = W / 2;
    let curY = 80;

    // Context strip
    if (sc.context) {
      const ctxW = clamp(600, 800, W * 0.9);
      const ctxX = cx - ctxW / 2;
      g.fillStyle(0x271c3d);
      g.fillRoundedRect(ctxX, curY, ctxW, 50, 8);
      g.lineStyle(1, 0xd946ef, 0.35);
      g.strokeRoundedRect(ctxX, curY, ctxW, 50, 8);
      g.fillStyle(0xd946ef, 1); g.fillRect(ctxX, curY, 4, 50);
      this.add.text(ctxX + 16, curY + 10, sc.context, {
        fontSize: '11px', fontFamily: 'Inter, sans-serif', fontStyle: 'italic',
        color: '#8b7fa8', wordWrap: { width: ctxW - 32 }
      });
      curY += 62;
    }

    // Speaker + quote
    const spk = sc.speaker;
    const avX = cx - clamp(300, 380, W * 0.43);
    const avY = curY + 30;
    g.fillStyle(0x1a3a5c); g.fillCircle(avX, avY, 26);
    g.lineStyle(2, parseInt(spk.color.replace('#', '0x'))); g.strokeCircle(avX, avY, 26);
    this.add.text(avX, avY, spk.emoji, { fontSize: '20px' }).setOrigin(0.5);

    const spkNameX = avX + 36;
    this.add.text(spkNameX, curY, spk.name.toUpperCase(), {
      fontSize: '9px', fontFamily: 'Inter, sans-serif', fontStyle: 'bold',
      color: spk.color, letterSpacing: 1
    });
    this.add.text(spkNameX, curY + 14, spk.role, {
      fontSize: '9px', fontFamily: 'Inter, sans-serif', color: '#8b7fa8'
    });

    const bubW = clamp(400, 560, W * 0.65);
    const bubX = spkNameX;
    const bubY = curY + 28;
    g.fillStyle(0x271c3d);
    g.fillRoundedRect(bubX, bubY, bubW, 80, 10);
    g.lineStyle(1, 0x2e2249);
    g.strokeRoundedRect(bubX, bubY, bubW, 80, 10);
    this.add.text(bubX + 16, bubY + 14, sc.quote, {
      fontSize: '13px', fontFamily: 'Inter, sans-serif',
      color: '#ede8f5', wordWrap: { width: bubW - 32 }, lineSpacing: 4
    });
    curY += 100;

    // Choices
    this.add.text(cx - clamp(300, 400, W * 0.45), curY + 12, 'HOW DO YOU RESPOND?', {
      fontSize: '10px', fontFamily: 'Inter, sans-serif', fontStyle: 'bold',
      color: '#8b7fa8', letterSpacing: 2
    });
    curY += 34;

    const choiceW = clamp(600, 800, W * 0.9);
    const choiceX = cx - choiceW / 2;
    const letters = ['A', 'B', 'C', 'D'];

    sc.choices.forEach((choice, i) => {
      const cy2 = curY + i * 58;
      const ch2 = 50;

      g.fillStyle(0x1e1530);
      g.fillRoundedRect(choiceX, cy2, choiceW, ch2, 8);
      g.lineStyle(2, 0x2e2249);
      g.strokeRoundedRect(choiceX, cy2, choiceW, ch2, 8);

      g.fillStyle(0x271c3d);
      g.fillRoundedRect(choiceX + 10, cy2 + 12, 26, 26, 5);
      this.add.text(choiceX + 23, cy2 + 25, letters[i], {
        fontSize: '11px', fontFamily: 'Inter, sans-serif', fontStyle: 'bold', color: '#d946ef'
      }).setOrigin(0.5);

      this.add.text(choiceX + 46, cy2 + 11, choice.text, {
        fontSize: '12px', fontFamily: 'Inter, sans-serif',
        color: '#ede8f5', wordWrap: { width: choiceW - 60 }
      });

      const zone = this.add.zone(choiceX, cy2, choiceW, ch2).setOrigin(0).setInteractive({ cursor: 'pointer' });
      const hl = this.add.graphics();
      zone.on('pointerover', () => {
        if (this.answered) return;
        AudioSystem.playHover();
        hl.clear();
        hl.lineStyle(2, 0xd946ef);
        hl.strokeRoundedRect(choiceX, cy2, choiceW, ch2, 8);
        hl.fillStyle(0xd946ef, 0.06);
        hl.fillRoundedRect(choiceX, cy2, choiceW, ch2, 8);
      });
      zone.on('pointerout', () => hl.clear());
      zone.on('pointerdown', () => {
        if (this.answered) return;
        this.answered = true;
        this.handleChoice(choice);
      });
    });

    this.add.text(W - 20, H - 18, '\u2190 Back to map', {
      fontSize: '11px', fontFamily: 'Inter, sans-serif', color: '#8b7fa8'
    }).setOrigin(1).setInteractive({ cursor: 'pointer' })
      .on('pointerdown', () => {
        if (this.answered) return;
        this.answered = true;
        AudioSystem.fadeAmbient(1.0, 1.5);
        this.scene.start('CityScene');
      })
      .on('pointerover', function() { this.setColor('#d946ef'); })
      .on('pointerout', function() { this.setColor('#8b7fa8'); });
  }

  handleChoice(choice) {
    AudioSystem.playClick();
    if (choice.deal > 0) {
      AudioSystem.playSuccess();
    } else {
      AudioSystem.playWrong();
    }
    AudioSystem.playTransition();
    STATE.dealHealth = clamp(0, 100, STATE.dealHealth + choice.deal);
    STATE.championStrength = clamp(0, 100, STATE.championStrength + choice.champion);
    STATE.energy = clamp(0, 10, STATE.energy + choice.energy);
    STATE.completed.push(this.scenario.id);
    STATE.lastChoice = choice;
    STATE.feedbackQueue.push(choice.feedback);
    this.cameras.main.flash(300, 13, 6, 24);
    this.time.delayedCall(400, () => {
      AudioSystem.fadeAmbient(1.0, 1.5);
      if (STATE.dealHealth <= 0) {
        this.scene.start('OutcomeScene', { won: false });
      } else {
        this.scene.start('CityScene');
      }
    });
  }

  drawBarMini(g, x, y, width, label, pct, c1, c2) {
    // FIX 5: wider label area (96px), right-edge safe value position
    this.add.text(x, y, label, {
      fontSize: '10px', fontFamily: 'Inter, sans-serif', fontStyle: 'bold', color: '#a895c0', letterSpacing: 1
    });
    const barX = x + 96;
    const barW = width - 96;
    g.fillStyle(0x1e1530);
    g.fillRoundedRect(barX, y + 1, barW, 7, 3);
    const fillW = Math.max(0, Math.min(1, pct / 100)) * barW;
    if (fillW > 0) {
      g.fillGradientStyle(c1, c2, c1, c2, 1);
      g.fillRoundedRect(barX, y + 1, fillW, 7, 3);
    }
    const valX = Math.min(x + width + 4, W - 28);
    this.add.text(valX, y - 1, Math.round(pct).toString(), {
      fontSize: '10px', fontFamily: 'Inter, sans-serif', fontStyle: 'bold', color: '#ede8f5'
    });
  }
}

// ============================================================
// SCENE: SCRAMBLE MINI-GAME
// ============================================================
class ScrambleScene extends Phaser.Scene {
  constructor() { super({ key: 'ScrambleScene' }); }

  init(data) {
    this.qIndex = data.qIndex || 0;
    this.correct = 0;
    this.total = SCRAMBLE_QS.length;
    this.done = false;
  }

  create() {
    AudioSystem.fadeAmbient(0.15, 0.8);
    this.cameras.main.setBackgroundColor('#0d0618');
    this.renderQ(this.qIndex);
  }

  renderQ(idx) {
    this.children.removeAll(true);
    const q = SCRAMBLE_QS[idx % SCRAMBLE_QS.length];
    const g = this.add.graphics();

    g.fillStyle(0x1e1530); g.fillRect(0, 0, W, 54);
    g.lineStyle(1, 0x2e2249); g.lineBetween(0, 54, W, 54);
    g.fillStyle(0xd946ef); g.fillRect(0, 0, W, 3);

    this.add.text(20, 16, '\u26a1  DISCOVERY SCRAMBLE', {
      fontSize: '13px', fontFamily: 'Inter, sans-serif', fontStyle: 'bold', color: '#d946ef', letterSpacing: 2
    });
    this.add.text(20, 38, 'Question ' + (idx + 1) + ' of ' + this.total + '  \u00b7  What\'s the best response?', {
      fontSize: '10px', fontFamily: 'Inter, sans-serif', color: '#8b7fa8'
    });

    // Progress dots
    for (let i = 0; i < this.total; i++) {
      const dx = W - 30 - (this.total - 1 - i) * 22;
      const filled = i < this.correct;
      const current = i === idx;
      g.fillStyle(filled ? 0xd946ef : current ? 0xa78bfa : 0x2e2249);
      g.fillCircle(dx, 27, 7);
      if (current) {
        g.fillStyle(0xd946ef, 0.2);
        g.fillCircle(dx, 27, 12);
      }
    }

    const splitX = W * 0.44;
    g.fillStyle(0x130d1c); g.fillRect(0, 54, splitX, H - 54);

    const spk = q.speaker;
    const avY = H * 0.28;
    g.fillStyle(0x1a3a5c); g.fillCircle(splitX * 0.5, avY, 44);
    g.lineStyle(3, parseInt(spk.color.replace('#', '0x'))); g.strokeCircle(splitX * 0.5, avY, 44);
    this.add.text(splitX * 0.5, avY, spk.emoji, { fontSize: '32px' }).setOrigin(0.5);
    this.add.text(splitX * 0.5, avY + 58, spk.name.toUpperCase(), {
      fontSize: '11px', fontFamily: 'Inter, sans-serif', fontStyle: 'bold', color: spk.color, letterSpacing: 1
    }).setOrigin(0.5);
    this.add.text(splitX * 0.5, avY + 76, spk.role, {
      fontSize: '10px', fontFamily: 'Inter, sans-serif', color: '#8b7fa8'
    }).setOrigin(0.5);

    if (q.context) {
      this.add.text(splitX * 0.5, avY - 58, q.context, {
        fontSize: '10px', fontFamily: 'Inter, sans-serif', fontStyle: 'italic',
        color: '#4a3860', wordWrap: { width: splitX - 36 }, align: 'center'
      }).setOrigin(0.5);
    }

    // Speech bubble
    const bubY = avY + 100;
    const bubW = splitX - 50;
    const bubX = 25;
    g.fillStyle(0x1e1530); g.fillRoundedRect(bubX, bubY, bubW, 110, 12);
    g.lineStyle(1.5, 0x2e2249); g.strokeRoundedRect(bubX, bubY, bubW, 110, 12);
    const tailX = bubX + bubW * 0.5;
    g.fillStyle(0x1e1530);
    g.fillTriangle(tailX - 8, bubY + 110, tailX + 8, bubY + 110, tailX, bubY + 124);
    this.add.text(bubX + 14, bubY + 14, q.quote, {
      fontSize: '13px', fontFamily: 'Inter, sans-serif',
      color: '#ede8f5', lineSpacing: 5, wordWrap: { width: bubW - 28 }
    });

    g.lineStyle(1, 0x2e2249); g.lineBetween(splitX, 54, splitX, H);
    g.fillStyle(0x0d0618); g.fillRect(splitX, 54, W - splitX, H - 54);

    this.add.text(splitX + 24, 80, 'CHOOSE YOUR RESPONSE', {
      fontSize: '10px', fontFamily: 'Inter, sans-serif', fontStyle: 'bold', color: '#8b7fa8', letterSpacing: 2
    });

    // Timer
    const timerX = W - 60, timerY = 96;
    const totalSecs = 8;
    g.lineStyle(4, 0x2e2249); g.strokeCircle(timerX, timerY, 26);
    this.timerArc = this.add.graphics();
    this.timerVal = totalSecs;
    this.timerTxt = this.add.text(timerX, timerY, totalSecs + 's', {
      fontSize: '12px', fontFamily: 'Inter, sans-serif', fontStyle: 'bold', color: '#d946ef'
    }).setOrigin(0.5);
    this.drawTimerArc(1, timerX, timerY);

    this.timerEvent = this.time.addEvent({
      delay: 1000,
      repeat: totalSecs - 1,
      callback: () => {
        if (this.done) return;
        this.timerVal -= 1;
        const pct = Math.max(0, this.timerVal / totalSecs);
        this.timerTxt.setText(this.timerVal + 's');
        this.drawTimerArc(pct, timerX, timerY);
        if (this.timerVal <= 2) {
          AudioSystem.playUrgentTick();
        } else {
          AudioSystem.playTick();
        }
        if (this.timerVal <= 0) {
          this.done = true;
          this.showResult(false, q, null);
        }
      }
    });

    // Options
    const optStartY = 138;
    const optW = W - splitX - 48;
    const optX = splitX + 24;

    q.options.forEach((opt, i) => {
      const oy = optStartY + i * 96;
      const oh = 82;
      g.fillStyle(0x1e1530);
      g.fillRoundedRect(optX, oy, optW, oh, 10);
      g.lineStyle(2, 0x2e2249);
      g.strokeRoundedRect(optX, oy, optW, oh, 10);

      this.add.text(optX + 14, oy + 10, opt.label.toUpperCase(), {
        fontSize: '9px', fontFamily: 'Inter, sans-serif', fontStyle: 'bold',
        color: '#8b7fa8', letterSpacing: 1
      });
      this.add.text(optX + 14, oy + 26, opt.text, {
        fontSize: '12px', fontFamily: 'Inter, sans-serif',
        color: '#ede8f5', wordWrap: { width: optW - 28 }, lineSpacing: 3
      });

      const zone = this.add.zone(optX, oy, optW, oh).setOrigin(0).setInteractive({ cursor: 'pointer' });
      const hl = this.add.graphics();
      zone.on('pointerover', () => {
        if (this.done) return;
        AudioSystem.playHover();
        hl.clear();
        hl.lineStyle(2, 0xa78bfa);
        hl.strokeRoundedRect(optX, oy, optW, oh, 10);
        hl.fillStyle(0xa78bfa, 0.05);
        hl.fillRoundedRect(optX, oy, optW, oh, 10);
      });
      zone.on('pointerout', () => hl.clear());
      zone.on('pointerdown', () => {
        if (this.done) return;
        this.done = true;
        this.timerEvent.remove();
        AudioSystem.playClick();
        if (opt.best) {
          AudioSystem.playSuccess();
        } else {
          AudioSystem.playWrong();
        }
        this.showResult(opt.best, q, i);
      });
    });

    this.add.text(W - 20, H - 18, '\u2190 Skip to map', {
      fontSize: '11px', fontFamily: 'Inter, sans-serif', color: '#4a3860'
    }).setOrigin(1).setInteractive({ cursor: 'pointer' })
      .on('pointerdown', () => {
        if (this.done) return;
        this.done = true;
        this.timerEvent.remove();
        AudioSystem.fadeAmbient(1.0, 1.5);
        this.scene.start('CityScene');
      })
      .on('pointerover', function() { this.setColor('#8b7fa8'); })
      .on('pointerout', function() { this.setColor('#4a3860'); });
  }

  drawTimerArc(pct, tx, ty) {
    this.timerArc.clear();
    const color = pct > 0.4 ? 0xd946ef : 0xef4444;
    this.timerArc.lineStyle(4, color);
    this.timerArc.beginPath();
    this.timerArc.arc(tx, ty, 26, -Math.PI / 2, -Math.PI / 2 + Math.PI * 2 * pct, false);
    this.timerArc.strokePath();
  }

  showResult(correct, q, chosenIdx) {
    const overlay = this.add.graphics().setDepth(40);
    overlay.fillStyle(0x0d0618, 0.92);
    overlay.fillRect(0, 0, W, H);

    const cx = W / 2;
    const g = this.add.graphics().setDepth(41);

    const boxW = Math.min(560, W - 60);
    const boxX = cx - boxW / 2;
    const boxY = H * 0.15;

    const accentColor = correct ? 0x22c55e : 0xef4444;
    const accentHex = correct ? '#22c55e' : '#ef4444';
    const icon = correct ? '\u2713' : '\u2717';
    const title = correct ? 'Strong Move' : (chosenIdx === null ? 'Time\'s Up' : 'Missed It');
    // Timeout path hasn't played any sound yet | play wrong
    if (chosenIdx === null) AudioSystem.playWrong();

    g.fillStyle(0x1e1530);
    g.fillRoundedRect(boxX, boxY, boxW, H * 0.68, 14);
    g.lineStyle(2, accentColor);
    g.strokeRoundedRect(boxX, boxY, boxW, H * 0.68, 14);
    g.fillStyle(accentColor);
    g.fillRect(boxX, boxY, boxW, 4);

    this.add.text(cx, boxY + 42, icon, {
      fontSize: '36px', fontFamily: 'Inter, sans-serif', fontStyle: 'bold', color: accentHex
    }).setOrigin(0.5).setDepth(42);

    this.add.text(cx, boxY + 86, title, {
      fontSize: '18px', fontFamily: 'Inter, sans-serif', fontStyle: 'bold', color: '#ede8f5'
    }).setOrigin(0.5).setDepth(42);

    if (!correct) {
      this.add.text(cx, boxY + 115, 'Best answer was:', {
        fontSize: '10px', fontFamily: 'Inter, sans-serif', color: '#8b7fa8', letterSpacing: 1
      }).setOrigin(0.5).setDepth(42);

      const bestOpt = q.options.find(o => o.best);
      g.fillStyle(0x0a2010);
      g.fillRoundedRect(boxX + 20, boxY + 132, boxW - 40, 68, 8);
      g.lineStyle(2, 0x22c55e);
      g.strokeRoundedRect(boxX + 20, boxY + 132, boxW - 40, 68, 8);
      this.add.text(boxX + 34, boxY + 144, bestOpt.label.toUpperCase(), {
        fontSize: '9px', fontFamily: 'Inter, sans-serif', fontStyle: 'bold', color: '#22c55e', letterSpacing: 1
      }).setDepth(42);
      this.add.text(boxX + 34, boxY + 160, bestOpt.text, {
        fontSize: '12px', fontFamily: 'Inter, sans-serif', color: '#86efac',
        wordWrap: { width: boxW - 68 }, lineSpacing: 3
      }).setDepth(42);
    }

    const whyY = correct ? boxY + 130 : boxY + 214;
    this.add.text(cx, whyY + 8, 'WHY THIS MATTERS', {
      fontSize: '9px', fontFamily: 'Inter, sans-serif', fontStyle: 'bold', color: '#8b7fa8', letterSpacing: 2
    }).setOrigin(0.5).setDepth(42);
    this.add.text(cx, whyY + 28, q.bestWhy, {
      fontSize: '12px', fontFamily: 'Inter, sans-serif', fontStyle: 'italic',
      color: '#a895c0', wordWrap: { width: boxW - 40 }, align: 'center', lineSpacing: 3
    }).setOrigin(0.5).setDepth(42);

    // State update
    if (correct) {
      STATE.dealHealth = clamp(0, 100, STATE.dealHealth + 8);
      STATE.championStrength = clamp(0, 100, STATE.championStrength + 6);
      STATE.streak++;
      if (STATE.streak >= 3) STATE.energy = clamp(0, 10, STATE.energy + 1);
      this.correct++;
    } else {
      STATE.dealHealth = clamp(0, 100, STATE.dealHealth - 4);
    }

    // Next button
    const btnY = boxY + H * 0.68 - 62;
    const btnW2 = 200, btnH2 = 44;
    const btnX = cx - btnW2 / 2;
    const isLast = this.qIndex >= this.total - 1;
    const btnTxt2 = isLast ? 'Back to Map' : 'Next Question';

    const btnG = this.add.graphics().setDepth(42);
    const drawBtn = (hover) => {
      btnG.clear();
      btnG.fillStyle(hover ? accentColor : 0x1e1530);
      btnG.fillRoundedRect(btnX, btnY, btnW2, btnH2, 8);
      btnG.lineStyle(2, accentColor);
      btnG.strokeRoundedRect(btnX, btnY, btnW2, btnH2, 8);
    };
    drawBtn(false);
    this.add.text(cx, btnY + btnH2 / 2, btnTxt2, {
      fontSize: '14px', fontFamily: 'Inter, sans-serif', fontStyle: 'bold', color: '#ede8f5'
    }).setOrigin(0.5).setDepth(43);

    const btnZone = this.add.zone(btnX, btnY, btnW2, btnH2).setOrigin(0).setInteractive({ cursor: 'pointer' }).setDepth(44);
    btnZone.on('pointerover', () => { AudioSystem.playHover(); drawBtn(true); });
    btnZone.on('pointerout', () => drawBtn(false));
    btnZone.on('pointerdown', () => {
      AudioSystem.playClick();
      this.cameras.main.flash(200, 13, 6, 24);
      this.time.delayedCall(300, () => {
        if (isLast) {
          AudioSystem.fadeAmbient(1.0, 1.5);
          this.scene.start('CityScene');
        } else {
          this.done = false;
          this.qIndex++;
          this.renderQ(this.qIndex);
        }
      });
    });
  }
}

// ============================================================
// SCENE: OUTCOME
// ============================================================
class OutcomeScene extends Phaser.Scene {
  constructor() { super({ key: 'OutcomeScene' }); }

  init(data) { this.won = data.won; }

  create() {
    const won = this.won;
    AudioSystem.stopAmbient();
    this.time.delayedCall(400, () => {
      if (won) AudioSystem.playSuccess(); else AudioSystem.playWrong();
    });
    this.cameras.main.setBackgroundColor('#0a0612');
    const g = this.add.graphics();

    g.fillStyle(0x0a0612); g.fillRect(0, 0, W, H);
    for (let i = 0; i < 100; i++) {
      g.fillStyle(0xffffff, Math.random() * 0.5 + 0.05);
      g.fillCircle(Math.random() * W, Math.random() * H, Math.random() + 0.5);
    }

    const cx = W / 2;
    const boxW = Math.min(640, W - 60);
    const boxH = Math.min(520, H - 80);
    const boxX = cx - boxW / 2;
    const boxY = (H - boxH) / 2;

    const accentC = won ? 0xd946ef : 0xef4444;
    const accentH = won ? '#d946ef' : '#ef4444';

    g.fillStyle(accentC, 0.04);
    g.fillCircle(cx, H / 2, 340);
    g.fillStyle(accentC, 0.06);
    g.fillCircle(cx, H / 2, 200);

    g.fillStyle(0x1e1530);
    g.fillRoundedRect(boxX, boxY, boxW, boxH, 14);
    g.lineStyle(2, accentC, 0.8);
    g.strokeRoundedRect(boxX, boxY, boxW, boxH, 14);
    g.fillStyle(accentC);
    g.fillRect(boxX, boxY, boxW, 4);

    const headline = won ? '\ud83c\udfc6  Deal Closed!' : '\ud83d\udc80  Deal Lost';
    const sub = won
      ? 'Axiom Systems signed. You navigated the deal from discovery to close.'
      : 'Deal health hit zero. Axiom went with Vertex Solutions.';

    this.add.text(cx, boxY + 50, headline, {
      fontSize: clamp(22, 32, W / 28) + 'px',
      fontFamily: 'Georgia, serif', fontStyle: 'italic', color: '#ede8f5'
    }).setOrigin(0.5);

    this.add.text(cx, boxY + 96, sub, {
      fontSize: '13px', fontFamily: 'Inter, sans-serif',
      color: '#8b7fa8', wordWrap: { width: boxW - 60 }, align: 'center'
    }).setOrigin(0.5);

    g.lineStyle(1, 0x2e2249); g.lineBetween(boxX + 30, boxY + 120, boxX + boxW - 30, boxY + 120);

    // Stats
    const statsY = boxY + 140;
    const stats = [
      { label: 'Deal Health',       val: STATE.dealHealth,      max: 100, c1: 0xd946ef, c2: 0xa78bfa },
      { label: 'Champion Strength', val: STATE.championStrength, max: 100, c1: 0x22c55e,  c2: 0x86efac },
      { label: 'Energy Remaining',  val: STATE.energy,          max: 10,  c1: 0xf59e0b,  c2: 0xfde68a },
    ];
    const statW = (boxW - 80) / stats.length;
    stats.forEach((s, i) => {
      const sx = boxX + 40 + i * statW;
      const pct = s.val / s.max;

      g.fillStyle(0x130d1c);
      g.fillRoundedRect(sx, statsY, statW - 16, 110, 10);
      g.lineStyle(1, 0x2e2249);
      g.strokeRoundedRect(sx, statsY, statW - 16, 110, 10);

      const displayVal = s.max === 10 ? s.val + '/10' : Math.round(s.val) + '%';
      this.add.text(sx + (statW - 16) / 2, statsY + 24, displayVal, {
        fontSize: '22px', fontFamily: 'Inter, sans-serif', fontStyle: 'bold',
        color: '#' + s.c1.toString(16).padStart(6, '0')
      }).setOrigin(0.5);
      this.add.text(sx + (statW - 16) / 2, statsY + 52, s.label, {
        fontSize: '10px', fontFamily: 'Inter, sans-serif', fontStyle: 'bold',
        color: '#8b7fa8', letterSpacing: 0.5, align: 'center', wordWrap: { width: statW - 24 }
      }).setOrigin(0.5);

      const bx = sx + 14, by = statsY + 82, bw = statW - 44;
      g.fillStyle(0x1e1530); g.fillRoundedRect(bx, by, bw, 8, 4);
      if (pct > 0) {
        g.fillGradientStyle(s.c1, s.c2, s.c1, s.c2, 1);
        g.fillRoundedRect(bx, by, bw * pct, 8, 4);
      }
    });

    const recapY = statsY + 128;
    this.add.text(cx, recapY, 'Scenarios Completed: ' + STATE.completed.length + ' / ' + SCENARIOS.length, {
      fontSize: '11px', fontFamily: 'Inter, sans-serif', color: '#4a3860', letterSpacing: 1
    }).setOrigin(0.5);

    const debriefMsg = won
      ? (STATE.championStrength >= 70
        ? 'Your champion Priya was a strong internal advocate , that made the close possible.'
        : 'You closed, but champion strength was average. Consider investing more in your internal allies.')
      : (STATE.completed.length < 4
        ? 'You didn\'t get enough discovery in. Deal died before you could build real value.'
        : 'Value was built late. Vertex\'s lower price won the battle you didn\'t show up to fight.');
    this.add.text(cx, recapY + 22, debriefMsg, {
      fontSize: '12px', fontFamily: 'Inter, sans-serif', fontStyle: 'italic',
      color: '#8b7fa8', wordWrap: { width: boxW - 60 }, align: 'center', lineSpacing: 3
    }).setOrigin(0.5);

    // Buttons
    const btnRowY = boxY + boxH - 68;
    const buttons = [
      { text: 'Play Again',        x: cx - 170, w: 150, h: 44, cb: () => { AudioSystem.playClick(); AudioSystem.playTransition(); this.cameras.main.flash(400, 13, 6, 24); this.time.delayedCall(500, () => this.scene.start('TitleScene')); } },
      { text: '\u26a1 Scramble Mode', x: cx - 5, w: 160, h: 44, cb: () => { AudioSystem.playClick(); resetState(); this.cameras.main.flash(300, 13, 6, 24); this.time.delayedCall(400, () => this.scene.start('ScrambleScene', { qIndex: 0 })); } },
    ];
    buttons.forEach(btn => {
      const bg = this.add.graphics();
      const draw = (hover) => {
        bg.clear();
        bg.fillStyle(hover ? accentC : 0x1e1530);
        bg.fillRoundedRect(btn.x, btnRowY, btn.w, btn.h, 8);
        bg.lineStyle(2, accentC);
        bg.strokeRoundedRect(btn.x, btnRowY, btn.w, btn.h, 8);
      };
      draw(false);
      this.add.text(btn.x + btn.w / 2, btnRowY + btn.h / 2, btn.text, {
        fontSize: '13px', fontFamily: 'Inter, sans-serif', fontStyle: 'bold', color: '#ede8f5'
      }).setOrigin(0.5);
      const z = this.add.zone(btn.x, btnRowY, btn.w, btn.h).setOrigin(0).setInteractive({ cursor: 'pointer' });
      z.on('pointerover', () => { AudioSystem.playHover(); draw(true); });
      z.on('pointerout', () => draw(false));
      z.on('pointerdown', btn.cb);
    });
  }
}

// HELPERS
// ============================================================
function clamp(min, max, val) {
  return Math.max(min, Math.min(max, val));
}

class OnboardingScene extends Phaser.Scene {
  constructor() { super({ key: 'OnboardingScene' }); }

  create() {
    this.panel = 0;

  showPanel(idx) {
    this.children.removeAll(true);
    const cx = W / 2;
    const g = this.add.graphics();
    const panels = [this.renderPanel1, this.renderPanel2, this.renderPanel3, this.renderPanel4, this.renderPanel5];

      g.fillStyle(0xffffff, Math.random() * 0.35 + 0.05);
      g.fillCircle(Math.random() * W, Math.random() * H, Math.random() + 0.3);
    }

    panels[idx].call(this, g, cx);

    // Panel dots
    for (let i = 0; i < panels.length; i++) {
      const dot = this.add.graphics();
      dot.fillStyle(i === idx ? 0xd946ef : 0x2e2249);
      dot.fillCircle(cx - (panels.length - 1) * 14 + i * 28, H - 42, i === idx ? 7 : 5);
    }

    // Next / Start button
    const isLast = idx === panels.length - 1;
    const btnLabel = isLast ? 'Start Your Quarter \u2192' : 'Next \u2192';

    const btnX = cx - btnW / 2, btnY = H - 88;
    const btnG = this.add.graphics();
    const drawBtn = (hover) => {
      btnG.clear();
      btnG.fillStyle(hover ? 0xd946ef : 0x1e1530);
      btnG.fillRoundedRect(btnX, btnY, btnW, btnH, 10);
      btnG.lineStyle(2, 0xd946ef);
      btnG.strokeRoundedRect(btnX, btnY, btnW, btnH, 10);
    };
    drawBtn(false);
    this.add.text(cx, btnY + btnH / 2, btnLabel, {
      fontSize: '15px', fontFamily: 'Inter, sans-serif', fontStyle: 'bold', color: '#ede8f5'
    }).setOrigin(0.5);
    const zone = this.add.zone(btnX, btnY, btnW, btnH).setOrigin(0).setInteractive({ cursor: 'pointer' });
    zone.on('pointerover', () => { AudioSystem.playHover(); drawBtn(true); });
    zone.on('pointerout', () => drawBtn(false));
    zone.on('pointerdown', () => {
      AudioSystem.playClick();
      if (isLast) {
        AudioSystem.playTransition();
        this.cameras.main.flash(400, 13, 6, 24);
        this.time.delayedCall(500, () => this.scene.start('CityScene'));
      } else {
        this.panel++;
        this.showPanel(this.panel);
      }
    });

    // Skip link
    this.add.text(W - 20, H - 18, 'Skip \u2192', {
      fontSize: '14px', fontFamily: 'Inter, sans-serif', color: '#8b7fa8'
    }).setOrigin(1).setInteractive({ cursor: 'pointer' })

        AudioSystem.playClick();
        this.cameras.main.flash(300, 13, 6, 24);
        this.time.delayedCall(400, () => this.scene.start('CityScene'));
      })
      .on('pointerover', function() { this.setColor('#8b7fa8'); })
      .on('pointerout', function() { this.setColor('#4a3860'); });
  }
